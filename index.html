<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفردات الطعام في جمل مفيدة</title>
<style>
body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:min(900px,92vw);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-size:2rem}.sub{opacity:.8;margin-bottom:20px}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.pill{background:#22c55e;padding:8px 14px;border-radius:999px;font-weight:700}.q{font-size:1.35rem;margin:24px 0;padding:18px;background:rgba(255,255,255,.06);border-radius:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.btn{padding:16px;border:none;border-radius:16px;background:#334155;color:#fff;font-size:1rem;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-2px);background:#475569}.msg{min-height:28px;margin-top:16px;font-weight:700}.next{margin-top:18px;background:#8b5cf6}.hidden{display:none}.footer{margin-top:18px;opacity:.7;font-size:.92rem}
</style>
</head>
<body>
<div class='card'>
<div class='top'><div><h1>🍽️ مفردات الطعام في جمل مفيدة</h1><div class='sub'>“Small words learned today become big confidence tomorrow.”</div><div class='sub' style='margin-top:8px'>اختر الكلمة المناسبة لإكمال كل جملة وتعلّم المعنى بسهولة.</div></div><div class='pill' id='score'>Score: 0</div></div>
<div class='q' id='question'></div>
<div class='grid' id='answers'></div>
<div class='msg' id='msg'></div>
<button class='btn next hidden' id='next'>Next Question</button>
<div class='footer'>Words: bland, spicy, refreshing, bitter, recipe, ingredients, raw, savory, scrumptious</div>
</div>
<script>
const data=[
{q:'This lemonade is cold and very ____ on a hot day.',a:'refreshing',o:['bitter','raw','refreshing','bland']},
{q:'The soup has no salt or flavor. It tastes ____.',a:'bland',o:['spicy','bland','savory','scrumptious']},
{q:'I need eggs, milk, and flour. These are the ____.',a:'ingredients',o:['recipe','ingredients','dessert','beverage']},
{q:'The chef followed the ____ to make the cake.',a:'recipe',o:['recipe','bitter','raw','savory']},
{q:'This curry is very ____. My mouth feels hot!',a:'spicy',o:['refreshing','spicy','bland','raw']},
{q:'Dark coffee can taste a little ____.',a:'bitter',o:['sweet','bitter','savory','cold']},
{q:'The carrots are still ____; they need more cooking.',a:'raw',o:['scrumptious','raw','savory','refreshing']},
{q:'I prefer ____ snacks like cheese crackers, not sweet candy.',a:'savory',o:['savory','bitter','recipe','raw']},
{q:'This chocolate cake is absolutely ____!',a:'scrumptious',o:['bland','scrumptious','raw','spicy']}
];
let i=0,score=0;
const q=document.getElementById('question'),ans=document.getElementById('answers'),msg=document.getElementById('msg'),next=document.getElementById('next'),scoreEl=document.getElementById('score');
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function render(){msg.textContent='';next.classList.add('hidden');const item=data[i];q.textContent=(i+1)+'. '+item.q;ans.innerHTML='';shuffle(item.o).forEach(t=>{const b=document.createElement('button');b.className='btn';b.textContent=t;b.onclick=()=>pick(t,item.a);ans.appendChild(b);});}
function pick(choice,correct){[...ans.children].forEach(b=>b.disabled=true);if(choice===correct){score++;scoreEl.textContent='Score: '+score;msg.textContent='✅ Correct! Great job.';msg.style.color='#4ade80';}else{msg.textContent='❌ Oops! Correct answer: '+correct;msg.style.color='#fca5a5';}next.classList.remove('hidden');}
next.onclick=()=>{i++; if(i<data.length){render();}else{q.textContent='🎉 Game Complete! Final Score: '+score+' / '+data.length;ans.innerHTML='';msg.textContent='You learned useful food vocabulary in sentences!';next.classList.add('hidden');}}
render();
</script>
</body>
</html>
